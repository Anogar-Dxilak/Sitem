<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" stroke="#00ff66" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Terminal prompt: > symbol -->
  <polyline points="6,10 13,16 6,22" stroke="#00ff66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor/underscore -->
  <rect x="15" y="20" width="11" height="2.5" rx="1.2" fill="#00ff66" opacity="0.9"/>
</svg>